# Praesidium cargo configuration.
#
# Two jobs: (1) the `cargo xtask` alias so the harness reads like Warden's, and (2) build-std
# setup so the bare-metal *-unknown-none targets compile core/alloc from source (there's no
# precompiled std for these targets — this is why rust-toolchain.toml pins `rust-src`).

[alias]
# `cargo xtask ...` -> `cargo run -p xtask -- ...` (matches Warden's workflow)
xtask = "run -p xtask --"

# ----------------------------------------------------------------------------------------
# Bare-metal target configuration (linker script + code model per arch).
#
# build-std is deliberately NOT set here. It is passed per-invocation by xtask's kernel
# build (`-Zbuild-std=core,alloc,compiler_builtins -Zbuild-std-features=compiler-builtins-mem`)
# so it applies ONLY to the *-unknown-none kernel image, never to host builds. A GLOBAL
# `[unstable] build-std` would recompile `core` for the host too and collide with libtest's
# prebuilt `core` (E0152), breaking `cargo test -p mem` / `-p cap-core`. Consequence: a direct
# `cargo build/clippy --target *-unknown-none` needs those -Z flags too — use `cargo xtask
# build --arch ...`, or pass `-Zbuild-std=...` explicitly (as CI's kernel clippy step does).
# ----------------------------------------------------------------------------------------

[target.x86_64-unknown-none]
# The kernel links at the canonical -2 GiB higher-half base (0xffffffff80000000).
# `code-model=kernel` makes RIP-relative references resolve within the negative
# 2 GiB half (the Warden refkernel lesson); `relocation-model=static` keeps the
# image position-fixed. The linker script wires the load address + entry.
rustflags = [
    "-C", "relocation-model=static",
    "-C", "code-model=kernel",
    "-C", "link-arg=-Tkernel/linker-x86_64.ld",
]

# The aarch64 kernel targets `aarch64-unknown-none-softfloat`, NOT `-none`: it is SOFT-FLOAT (no
# FP/SIMD codegen), matching x86-64-unknown-none (soft-float by default). The stackful context
# switch + IRQ stub (P3b) save only the integer register file; a NEON/FP instruction in a
# preemptible task would let a peer clobber its v-registers across a switch (silent corruption).
# A soft-float kernel has no live FP state to preserve — the standard kernel posture (userspace FP
# save/restore is a P7 concern). Rust ties `fp-armv8` to `neon` and forbids disabling them on the
# hardfloat target, so the soft-float *target* is the blessed way to do this.
[target.aarch64-unknown-none-softfloat]
rustflags = [
    "-C", "relocation-model=static",
    "-C", "link-arg=-Tkernel/linker-aarch64.ld",
]

# Host builds (xtask, tools, and `cargo test -p mem` / `-p cap-core` unit tests) use the host
# target with normal prebuilt std — no build-std, so libtest links cleanly. cargo selects the
# host target automatically for those.
