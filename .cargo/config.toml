# Praesidium cargo configuration.
#
# Two jobs: (1) the `cargo xtask` alias so the harness reads like Warden's, and (2) build-std
# setup so the bare-metal *-unknown-none targets compile core/alloc from source (there's no
# precompiled std for these targets — this is why rust-toolchain.toml pins `rust-src`).

[alias]
# `cargo xtask ...` -> `cargo run -p xtask -- ...` (matches Warden's workflow)
xtask = "run -p xtask --"

# ----------------------------------------------------------------------------------------
# Bare-metal target configuration. build-std compiles core + alloc for the kernel targets.
# compiler-builtins mem feature provides memcpy/memset/etc. that a no_std kernel needs.
# ----------------------------------------------------------------------------------------

[unstable]
build-std = ["core", "alloc", "compiler_builtins"]
build-std-features = ["compiler-builtins-mem"]

[target.x86_64-unknown-none]
# The kernel links at the canonical -2 GiB higher-half base (0xffffffff80000000).
# `code-model=kernel` makes RIP-relative references resolve within the negative
# 2 GiB half (the Warden refkernel lesson); `relocation-model=static` keeps the
# image position-fixed. The linker script wires the load address + entry.
rustflags = [
    "-C", "relocation-model=static",
    "-C", "code-model=kernel",
    "-C", "link-arg=-Tkernel/linker-x86_64.ld",
]

[target.aarch64-unknown-none]
rustflags = [
    "-C", "relocation-model=static",
    "-C", "link-arg=-Tkernel/linker-aarch64.ld",
]

# NOTE (P0): the [unstable] build-std above is global — it recompiles core/alloc for EVERY
# target, including the host. Host *library* builds and `cargo run -p xtask` are fine, but a
# host *test* target (`cargo test -p cap-core`) pulls libtest's prebuilt `core` alongside the
# build-std `core` and fails with E0152 (duplicate lang items). P0 has no host tests, so this
# is deferred: when the first host unit test lands (P2), build-std will be scoped off the host
# target (e.g. moved to per-invocation `-Z build-std` in xtask) so `cargo test` works again.
